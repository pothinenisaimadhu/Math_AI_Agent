<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Math AI Tutor</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" rel="stylesheet" />
    <link href="https://unpkg.com/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <style>
      body { background: linear-gradient(135deg, #eef2ff, #f5f3ff, #fdf2f8); min-height: 100vh; }
      .spin { animation: spin 1s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .fade-in { animation: fadeIn 0.3s ease; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useRef, useEffect } = React;
      const API_URL = window.MATH_API_URL || "https://mathaiagent-production.up.railway.app";

      const InlineMath = ({ math }) => {
        const ref = useRef(null);
        useEffect(() => {
          if (ref.current) katex.render(math, ref.current, { throwOnError: false });
        }, [math]);
        return <span ref={ref} />;
      };

      const BlockMath = ({ math }) => {
        const ref = useRef(null);
        useEffect(() => {
          if (ref.current) katex.render(math, ref.current, { throwOnError: false, displayMode: true });
        }, [math]);
        return <div ref={ref} />;
      };

      const renderMessageText = (text) => {
        const parts = text.split(/(\$\$[\s\S]+?\$\$|\$[\s\S]+?\$)/g);
        return parts.map((part, i) => {
          if (part.startsWith("$$") && part.endsWith("$$"))
            return <BlockMath key={i} math={part.slice(2, -2)} />;
          if (part.startsWith("$") && part.endsWith("$"))
            return <InlineMath key={i} math={part.slice(1, -1)} />;
          return <span key={i} className="whitespace-pre-wrap">{part}</span>;
        });
      };

      function App() {
        const [question, setQuestion] = useState("");
        const [messages, setMessages] = useState([]);
        const [loading, setLoading] = useState(false);
        const [chatHistory, setChatHistory] = useState([]);
        const [editingId, setEditingId] = useState(null);
        const [editText, setEditText] = useState("");
        const [sidebarOpen, setSidebarOpen] = useState(false);
        const messagesEndRef = useRef(null);

        useEffect(() => {
          messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
        }, [messages, loading]);

        const handleSubmit = async (queryText = question) => {
          if (!queryText.trim() || loading) return;
          const userMsg = { type: "user", text: queryText, id: Date.now() };
          setMessages(prev => [...prev, userMsg]);
          setQuestion("");
          setLoading(true);
          setSidebarOpen(false);

          try {
            const res = await fetch(`${API_URL}/solve`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ user_id: "demo", question: queryText }),
            });
            const data = await res.json();
            const botMsg = {
              type: "bot",
              text: data.error ? `Error: ${data.error}` : data.answer || "No answer provided",
              id: Date.now() + 1,
            };
            setMessages(prev => [...prev, botMsg]);
            setChatHistory(prev => [{
              id: Date.now(),
              question: queryText,
              timestamp: new Date().toLocaleTimeString(),
            }, ...prev]);
          } catch (err) {
            setMessages(prev => [...prev, { type: "bot", text: `Error: ${err.message}`, id: Date.now() + 1 }]);
          }
          setLoading(false);
        };

        const handleSaveEdit = () => {
          if (editText.trim()) { handleSubmit(editText); setEditingId(null); setEditText(""); }
        };

        return (
          <div className="flex h-screen max-w-7xl mx-auto">
            {/* Sidebar */}
            {sidebarOpen && (
              <div className="fixed inset-0 z-10 flex">
                <div className="w-80 bg-white border-r border-gray-200 flex flex-col shadow-xl">
                  <div className="p-4 bg-gradient-to-r from-indigo-600 to-purple-600 text-white flex justify-between items-center">
                    <h2 className="font-semibold text-lg">📋 Chat History</h2>
                    <button onClick={() => setSidebarOpen(false)} className="text-white text-xl font-bold">✕</button>
                  </div>
                  <div className="flex-1 overflow-y-auto p-4 space-y-3">
                    {chatHistory.length === 0 ? (
                      <p className="text-gray-400 text-sm text-center mt-8">No chat history yet</p>
                    ) : chatHistory.map(item => (
                      <div key={item.id} className="bg-gray-50 rounded-lg p-3 hover:bg-gray-100 transition-colors">
                        {editingId === item.id ? (
                          <div className="space-y-2">
                            <textarea
                              value={editText}
                              onChange={e => setEditText(e.target.value)}
                              className="w-full p-2 border border-gray-300 rounded-lg text-sm resize-none"
                              rows={2}
                            />
                            <div className="flex gap-2">
                              <button onClick={handleSaveEdit} className="px-3 py-1 bg-indigo-500 text-white rounded-lg text-xs hover:bg-indigo-600">Send</button>
                              <button onClick={() => setEditingId(null)} className="px-3 py-1 bg-gray-300 text-gray-700 rounded-lg text-xs">Cancel</button>
                            </div>
                          </div>
                        ) : (
                          <div>
                            <div className="flex items-start justify-between gap-2">
                              <p className="text-sm text-gray-800 hover:text-indigo-600 flex-1 cursor-pointer"
                                onClick={() => { setQuestion(item.question); setSidebarOpen(false); }}>
                                {item.question}
                              </p>
                              <button onClick={() => { setEditingId(item.id); setEditText(item.question); }}
                                className="text-gray-400 hover:text-indigo-500 text-xs px-1">✏️</button>
                            </div>
                            <p className="text-xs text-gray-500 mt-1">{item.timestamp}</p>
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                </div>
                <div className="flex-1 bg-black bg-opacity-30" onClick={() => setSidebarOpen(false)} />
              </div>
            )}

            {/* Main Chat */}
            <div className="flex-1 flex flex-col">
              <div className="p-5 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-b-2xl shadow-lg flex justify-between items-center">
                <div>
                  <h1 className="text-2xl font-extrabold">🧮 Math AI Tutor</h1>
                  <p className="text-indigo-100 text-sm mt-1">Your friendly guide to mastering math!</p>
                </div>
                <button onClick={() => setSidebarOpen(true)}
                  className="bg-white bg-opacity-20 hover:bg-opacity-30 text-white px-3 py-2 rounded-lg text-sm font-medium transition">
                  📋 History
                </button>
              </div>

              <div className="flex-1 overflow-y-auto p-6 space-y-4">
                {messages.length === 0 && !loading && (
                  <div className="text-center text-gray-400 mt-20">
                    <div className="text-6xl mb-4">🤖</div>
                    <p className="text-lg">Start by asking a math question!</p>
                    <p className="text-sm mt-2">Try: "What is the derivative of sin(x)?"</p>
                  </div>
                )}
                {messages.map(msg => (
                  <div key={msg.id} className={`flex items-start gap-3 fade-in ${msg.type === "user" ? "justify-end" : "justify-start"}`}>
                    {msg.type === "bot" && <div className="p-2 bg-indigo-100 rounded-full text-lg">🤖</div>}
                    <div className={`p-4 rounded-2xl max-w-2xl shadow-md ${
                      msg.type === "user"
                        ? "bg-gradient-to-r from-indigo-500 to-indigo-700 text-white"
                        : "bg-white border border-gray-200 text-gray-800"
                    }`}>
                      {renderMessageText(msg.text)}
                    </div>
                    {msg.type === "user" && <div className="p-2 bg-indigo-500 rounded-full text-lg">👤</div>}
                  </div>
                ))}
                {loading && (
                  <div className="flex items-center gap-3 text-indigo-500">
                    <div className="w-5 h-5 border-2 border-indigo-500 border-t-transparent rounded-full spin" />
                    <span>Solving...</span>
                  </div>
                )}
                <div ref={messagesEndRef} />
              </div>

              <div className="p-4 bg-white border-t border-gray-100 shadow-lg">
                <div className="flex items-end gap-3">
                  <textarea
                    value={question}
                    onChange={e => setQuestion(e.target.value)}
                    placeholder="Ask your math question (e.g., Solve x² + 2x - 3 = 0)..."
                    rows={2}
                    className="flex-1 resize-none border border-gray-200 rounded-xl p-4 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none bg-gray-50 text-gray-800 placeholder-gray-400"
                    onKeyPress={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleSubmit(); } }}
                  />
                  <button
                    onClick={() => handleSubmit()}
                    disabled={loading || !question.trim()}
                    className={`p-4 rounded-xl shadow-md transition-all ${
                      loading || !question.trim()
                        ? "bg-gray-300 cursor-not-allowed text-gray-500"
                        : "bg-gradient-to-r from-indigo-600 to-purple-600 text-white hover:from-indigo-700 hover:to-purple-700"
                    }`}
                  >
                    {loading ? <div className="w-5 h-5 border-2 border-white border-t-transparent rounded-full spin" /> : "➤"}
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
